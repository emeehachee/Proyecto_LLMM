    </header>
    
        <form action="#" method="post">

            <h1>Formulario de contacto</h1>
               
                <div class="fila">
                    <div class="campo">
                        <label for="nombre">Nombre:</label><br>
                        <input type="text" id="nombre" name="nombre" placeholder="Introduzca su nombre">
                    </div>

                    <div class="campo">
                        <label for="apellido">Apellido:</label><br>
                        <input type="text" id="apellido" name="apellido" placeholder="Introduzca su apellido">
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                         <label for="email">Email:</label><br>
                         <input type="email" id="email" name="email" placeholder="Introduzca su email">
                    </div>

                    <div class="campo">
                         <label for="Telefono">Telefono:</label><br>
                         <input type="tel" id="Telefono" name="Telefono" placeholder="Introduzca su telefono">    
                    </div>
                </div>

                <div class="campo_completo">       
                    <label for="mensaje">Mensaje:</label><br>
                    <textarea id="mensaje" name="mensaje" rows="5" cols="70" maxlength="500" placeholder="Introduzca el mensaje a enviar (maximo 500 caracteres)"></textarea>
                </div>
                
                <div class="botones">
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Borrar">
                </div>
        </form>
