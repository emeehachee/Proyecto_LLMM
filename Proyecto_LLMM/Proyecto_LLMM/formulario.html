    <title>Formulario</title>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a href="index.html">EatUp!</a></h1>
        </div>

        <nav class="menu">
            <a class="cabecera" href="platos.html#principales">PLATOS PRINCIPALES</a>

            <a href="carrito.html"><img src="Imagenes/107831.png" alt="Carrito"></a>
        </div>
    </header>

    <div class="formulario">

        <form action="#" method="post">
            <h1>Formulario de contacto</h1>
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" placeholder="Introduzca su nombre"><br><br>

                <label for="apellido">Apellido:</label><br>
                <input type="text" id="apellido" name="apellido" placeholder="Introduzca su apellido"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Introduzca su email"><br><br>

                <label for="Telefono">Telefono:</label><br>
                <input type="tel" id="Telefono" name="Telefono" placeholder="Introduzca su telefono"><br><br>     

                <label for="mensaje">Mensaje:</label><br>
                <textarea id="mensaje" name="mensaje" rows="7" cols="100" maxlength="500" placeholder="Introduzca el mensaje a enviar (maximo 500 caracteres)"></textarea><br><br>

                <input type="submit" value="Enviar">
                <input type="reset" value="Borrar">
        </form>
    </div>

    <footer>
        <h1 class="separacion">EatUp!</h1>
        <div>
            <h3 class="separacion">Servicios y productos</h3>
            <a class="pie" href="platos.html">Platos</a>
            <a class="pie" href="">Para empresas</a>
            <a class="pie" href="">Descuentos</a>
        </div> 

        <div>
            <h3 class="separacion">Ayuda</h3>
            <a class="pie" href="comoFunciona.html">Como funciona</a>
            <a class="pie" href="preguntas.html">Preguntas frecuentes</a>
        </div> 

        <div>
            <h3 class="separacion">Contacto</h3>
            <a class="pie" href="formulario.html">Contacta con nosotros</a>
            <p>eatup@gmail.com</p>
        </div> 
    </footer>
</body>
</html>
